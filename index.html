<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张三 - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #2d3748;
        }
        
        .title {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .bio {
            color: #718096;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 500;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }
        
        .btn-outline:hover {
            background: #667eea;
            color: white;
        }
        
        .footer {
            margin-top: 30px;
            color: #a0aec0;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">张</div>
        <h1>张三</h1>
        <div class="title">前端开发工程师</div>
        <p class="bio">
            热爱代码与设计，专注于创造优雅的用户体验。<br>
            喜欢 React、Vue 和一切美好的事物。
        </p>
        <div class="links">
            <a href="https://github.com/zhangsan" class="btn" target="_blank">GitHub</a>
            <a href="mailto:zhangsan@example.com" class="btn btn-outline">联系我</a>
        </div>
        <div class="footer">
            © 2026 张三 · 使用 GitHub Pages 部署
        </div>
    </div>
</body>
</html>
